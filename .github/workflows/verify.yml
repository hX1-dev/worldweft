name: Verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-and-unit:
    name: Source, static checks, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run godot:check-source
      - run: npm run godot:check-static
      - run: npm run godot:check-soak-policy
      - run: npm run godot:check-unit
