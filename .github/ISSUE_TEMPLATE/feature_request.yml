name: Feature proposal
description: Propose a focused extension to Worldweft.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What builder or world-design problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful behavior.
    validations:
      required: true
  - type: textarea
    id: authority
    attributes:
      label: Authority boundary
      description: Which durable records can change, and how does Convex adjudicate them?
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which tests or contracts should prove the behavior?
    validations:
      required: true
